services:
  db:
    image: postgres:16-alpine
    container_name: tulsi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: db_user_test
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: tulsi_test_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
